# Self-certifies the emulator's control server against the Retro Remote Debug
# Controller contract (SPEC 0.3.x), vendored at test/rrdc. Builds THIS commit's
# VDP + emulator and runs the shared conformance suite over its live HTTP
# surface, headless — so a change that breaks /status, /mem, /audio, /key, … is
# caught here rather than silently downstream in a port's own test harness.
#
# Runs in the same Debian-trixie image the dist build uses: it ships
# libsdl3-dev (ubuntu-latest's apt does not yet) and the pinned Rust toolchain.
# git is added for the (public) submodule fetch, python3-pytest for the suite.

name: 🔌 RRDC conformance

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: conformance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  conformance:
    name: 🔌 RRDC 0.3 conformance
    runs-on: ubuntu-latest
    container: rust:1.91.1-slim-trixie   # matches dist_scripts/Dockerfile

    steps:
      - name: 🔧 System deps (git, SDL3 + toolchain for the VDP, pytest)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git g++ make pkg-config libsdl3-dev python3 python3-pytest ca-certificates

      - name: 📦 Checkout (recursive — VDP + popup-mos + RRDC)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🔧 Trust the checkout (container runs as root)
        run: git config --global --add safe.directory '*'

      - name: 🖥️ Build VDP + emulator
        run: make

      - name: 🔌 Run RRDC conformance suite (headless)
        run: make conformance
